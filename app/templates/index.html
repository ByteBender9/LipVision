<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LipVision AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#0f172a;
            color:white;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;

        }

        .container{

            width:600px;

            background:#1e293b;

            padding:40px;

            border-radius:20px;

            text-align:center;

            box-shadow:0 0 25px rgba(0,0,0,.4);

        }

        h1{

            font-size:48px;

            margin-bottom:10px;

        }

        p{

            color:#cbd5e1;

            margin-bottom:30px;

        }

        input{

            width:100%;

            padding:15px;

            margin-bottom:25px;

        }

        button{

            width:100%;

            padding:15px;

            font-size:18px;

            border:none;

            border-radius:10px;

            cursor:pointer;

            background:#3b82f6;

            color:white;

            transition:.3s;

        }

        button:hover{

            background:#2563eb;

        }

    </style>

</head>

<body>

<div class="container">

<h1>👄 LipVision AI</h1>

<p>
Upload a video and let AI read the speaker's lips.
</p>

<form action="/upload"
      method="POST"
      enctype="multipart/form-data">

<input
type="file"
name="video"
accept="video/*"
required>

<button>

Upload Video

</button>

</form>

</div>

</body>

</html>
